  <h1>Kentucky Bluegrass Lawn Care Plan — Complete Guide</h1>
  <p>Kentucky bluegrass produces the finest, most beautiful cool-season lawn available &mdash; but it demands more care than any other grass type. This guide covers what it actually takes to grow it well.</p>

  <div class="article-body">
    <p>Kentucky bluegrass (Poa pratensis) is the premium cool-season lawn grass &mdash; the species responsible for the dark green, fine-textured, dense lawns associated with the Northeast, Midwest, and Pacific Northwest. Its self-repairing rhizome system means that a healthy Kentucky bluegrass stand fills in its own thin and bare spots without overseeding, which is a capability no other common cool-season grass shares.</p><p>The trade-off is that bluegrass is one of the most demanding lawn grasses to maintain. It requires more water than fescue, goes dormant quickly under summer heat stress, has poor shade tolerance, and needs more fertilizer than most homeowners realize to maintain density. In climates where summer temperatures regularly exceed 85&deg;F, bluegrass struggles &mdash; fescue or a bluegrass-fescue blend is a better choice.</p><ul><li><strong>Active growth:</strong> Spring and fall; summer semi-dormancy in warm climates</li><li><strong>Shade tolerance:</strong> Poor &mdash; needs at least 6 hours of direct sun</li><li><strong>Drought tolerance:</strong> Low to moderate &mdash; goes dormant faster than fescue under drought</li><li><strong>Self-repair:</strong> Excellent &mdash; spreads by rhizomes to fill bare spots</li><li><strong>Establishment method:</strong> Seed in fall or spring; slower to establish than fescue</li></ul>
    <h2 id="mowing">Mowing: Height and Frequency</h2>
    <p>Kentucky bluegrass should be mowed at 2.5&ndash;3.5 inches during most of the growing season. This height maintains adequate leaf area for photosynthesis while keeping the stand dense enough to compete with weeds. In summer, raise to 3.5&ndash;4 inches to reduce heat stress and moisture loss.</p><p>Mowing frequency during peak spring and fall growth (May&ndash;June, September&ndash;October) is every 5&ndash;7 days. This is more frequent than fescue because bluegrass grows more vigorously during cool-season peaks. During summer semi-dormancy, reduce frequency to match the reduced growth rate.</p><div class='tip'>&#128161; Kentucky bluegrass clippings, when mowed at the correct height and frequency, can be left on the lawn without contributing to thatch buildup. Short clippings decompose rapidly and return nitrogen to the soil &mdash; effectively providing a free quarter-pound of nitrogen per thousand square feet per season.</div><p>A rotary mower is appropriate for bluegrass at its target heights. Sharp blades are particularly important because bluegrass leaf blades are finer than fescue or warm-season grasses and show tearing damage more visibly as a brownish cast after mowing.</p>
    <h2 id="fertilizing">Fertilizing Schedule</h2>
    <p>Kentucky bluegrass responds significantly to nitrogen &mdash; more so than fescue. The fertilizing calendar follows cool-season grass logic: heaviest in fall, moderate in spring, minimal or none in summer.</p><ul><li><strong>Primary fall feeding (most important):</strong> Apply <a href='https://www.amazon.com/dp/B09TLBRQBK?tag=lawnunlocked-20' class='inline-link'>The Andersons PGF Complete 16-4-8</a> in September&ndash;October. This feeding drives root development and carbohydrate storage for winter, producing a stronger spring green-up.</li><li><strong>Late fall feeding:</strong> A second fall application of slow-release nitrogen 4&ndash;6 weeks after the first is appropriate for bluegrass &mdash; more so than for fescue. Bluegrass roots absorb nutrients at lower temperatures than other cool-season grasses.</li><li><strong>Spring feeding:</strong> Moderate application in April when soil temps exceed 50&deg;F. Over-fertilizing in spring pushes excessive blade growth at the expense of root development.</li><li><strong>Summer:</strong> Avoid nitrogen entirely except <a href='https://www.amazon.com/dp/B08TM3ZCVL?tag=lawnunlocked-20' class='inline-link'>Milorganite</a> at reduced rates if the lawn shows stress.</li></ul>
    <h2 id="weed">Weed Control Calendar</h2>
    <p>Pre-emergent application timing is critical for bluegrass. The spring crabgrass window opens when soil temperatures reach 55&deg;F &mdash; and pre-emergent must be applied before that point to be effective.</p><p><strong>Spring pre-emergent:</strong> Apply <a href='https://www.amazon.com/dp/B015BSNZP2?tag=lawnunlocked-20' class='inline-link'>Prodiamine 65 WDG</a> before soil temps hit 55&deg;F. For Kentucky bluegrass in the Midwest and Northeast, this typically means late March through mid-April depending on the season. Check local soil temperature data.</p><p><strong>Important for overseeding:</strong> Pre-emergent herbicide prevents all seed germination, including bluegrass seed. Do not apply pre-emergent in fall if you plan to overseed thin areas. If the lawn is thick enough not to need overseeding, fall pre-emergent for winter annuals is appropriate.</p><p><strong>Summer weed control:</strong> Bluegrass that goes semi-dormant in summer is vulnerable to weed invasion during that period. Maintain a healthy stand density through proper fall and spring fertilization &mdash; density is the best weed barrier in a bluegrass lawn.</p>

      <div class="season-card" style="background:#fff8e6;border-color:#ffe082;"><h3>&#9728;&#65039; Summer</h3><ul><li>Raise mow height to 3.5&ndash;4 inches</li><li>Reduce mowing frequency in heat</li><li>Water deeply 2&ndash;3 times per week</li><li>Allow dormancy if drought persists</li></ul></div>
      <div class="season-card" style="background:#fff3e0;border-color:#ffcc80;"><h3>&#127810; Fall</h3><ul><li>Most important season &mdash; overseed now</li><li>Two fall fertilizer applications</li><li>Core aerate and overseed in September</li><li>Broadleaf weed control in October</li></ul></div>
      <div class="season-card" style="background:#e8eaf6;border-color:#c5cae9;"><h3>&#10052;&#65039; Winter</h3><ul><li>No fertilizing until ground is frozen</li><li>Final mow at 2.5 inches before freeze</li><li>Order spring pre-emergent early</li><li>Sharpen blades and service equipment</li></ul></div>
