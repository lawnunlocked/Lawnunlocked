  <h1>St. Augustine Grass Lawn Care Plan — Complete Guide</h1>
  <p>St. Augustine is the most shade-tolerant warm-season grass available &mdash; but it requires specific care around chinch bugs, iron deficiency, and St. Augustine Decline virus.</p>

  <div class="article-body">
    <p>St. Augustine grass (Stenotaphrum secundatum) is the dominant lawn grass across Florida, the Gulf Coast, and lower Texas &mdash; and for good reason. It is the most shade-tolerant warm-season grass available, spreading aggressively through stolons to form a dense, weed-suppressive lawn that handles the hot, humid conditions of the Deep South better than any alternative.</p><p>St. Augustine cannot be established from seed &mdash; it is only available as sod or plugs, which means initial establishment costs are higher than seeded alternatives. But in its preferred climate zone, nothing outperforms it for overall performance in both sun and shade.</p><ul><li><strong>Active growth:</strong> Year-round in South Florida; spring through fall in North Florida and Gulf Coast</li><li><strong>Shade tolerance:</strong> Outstanding &mdash; the best of any warm-season grass</li><li><strong>Drought tolerance:</strong> Moderate &mdash; requires more irrigation than Bermuda or Zoysia</li><li><strong>Key pest:</strong> Chinch bugs &mdash; the most damaging pest for St. Augustine in Florida</li><li><strong>Key disease:</strong> St. Augustine Decline (SAD) virus &mdash; incurable, managed through variety selection</li></ul>
    <h2 id="mowing">Mowing: Height and Frequency</h2>
    <p>St. Augustine should be mowed at 2.5&ndash;4 inches &mdash; significantly taller than Bermuda or Zoysia. The taller height maintains the health and density of the large leaf blades that characterize St. Augustine. Cutting below 2 inches weakens the lawn and invites weed invasion and chinch bug damage.</p><p>In full sun, maintain 2.5&ndash;3 inches. In shade (which St. Augustine handles better than any other warm-season grass), raise to 3.5&ndash;4 inches to compensate for reduced photosynthesis from limited light.</p><p>A standard rotary mower is appropriate for St. Augustine at its target heights &mdash; the coarser blade structure does not require the precision cut of a reel mower the way Bermuda does. Keep blades sharp to avoid the ragged, discolored cuts that invite fungal disease entry in humid climates.</p><div class='warn'>&#9888;&#65039; Never scalp St. Augustine. Unlike Bermuda and Zoysia, St. Augustine does not recover well from aggressive low cuts. Scalping removes the growing points in the stolons and can kill large sections of lawn permanently.</div>
    <h2 id="fertilizing">Fertilizing Schedule</h2>
    <p>St. Augustine has moderate-to-high nitrogen requirements during the growing season. Iron deficiency (yellowing between the leaf veins, particularly in alkaline soils) is one of the most common problems in Florida St. Augustine lawns.</p><ul><li><strong>Growing season feeding:</strong> Apply fertilizer every 6&ndash;8 weeks when grass is actively growing. In South Florida, this can mean year-round feeding on a reduced schedule. In North Florida and Gulf Coast, suspend fertilizing November through February.</li><li><strong>Iron supplementation:</strong> If yellowing appears, apply a liquid iron product as a foliar spray. Iron deficiency in St. Augustine often indicates high soil pH &mdash; test and correct to 6.0&ndash;7.0 range.</li><li><strong>Summer:</strong> <a href='https://www.amazon.com/dp/B08TM3ZCVL?tag=lawnunlocked-20' class='inline-link'>Milorganite</a> is an excellent summer fertilizer for St. Augustine &mdash; the organic nitrogen is burn-proof in heat and the nutrient profile supports overall lawn health.</li><li><strong>Avoid high-phosphorus fertilizers</strong> in Florida &mdash; state regulations restrict phosphorus application in many counties due to water quality concerns. Check local ordinances before purchasing fertilizer.</li></ul>
    <h2 id="weed">Weed Control Calendar</h2>
    <p>St. Augustine's density makes it naturally competitive against most weeds when properly maintained. However, it is sensitive to some herbicides that are safe on other warm-season grasses.</p><p><strong>Pre-emergent (spring):</strong> <a href='https://www.amazon.com/dp/B015BSNZP2?tag=lawnunlocked-20' class='inline-link'>Prodiamine 65 WDG</a> applied before soil hits 55&deg;F. Safe for established St. Augustine at label rates. Do not use atrazine-based pre-emergents during active growth periods.</p><p><strong>Chinch bug control:</strong> Chinch bugs are the most destructive pest for St. Augustine in Florida. They appear as irregular brown patches that do not respond to irrigation &mdash; damage resembles drought stress but worsens as irrigation increases. Treat with a bifenthrin-based insecticide when damage is confirmed.</p><div class='tip'>&#128161; To confirm chinch bug infestation versus drought stress, push a coffee can with the bottom removed into the soil at the edge of a damage area and fill with water. If chinch bugs are present, they will float to the surface within 2&ndash;3 minutes.</div>
    <h2 id="seasonal">Seasonal Care Overview</h2>
    <div class="season-grid">

      <div class="season-card" style="background:#fff8e6;border-color:#ffe082;"><h3>&#9728;&#65039; Summer</h3><ul><li>Mow every 7&ndash;14 days at 2.5&ndash;4 inches</li><li>Fertilize every 6&ndash;8 weeks</li><li>Water 1&ndash;1.5 inches per week</li><li>Monitor for chinch bug damage</li></ul></div>
      <div class="season-card" style="background:#fff3e0;border-color:#ffcc80;"><h3>&#127810; Fall</h3><ul><li>Reduce fertilizing as temps drop</li><li>Fall pre-emergent for winter weeds</li><li>Reduce irrigation frequency</li><li>Watch for large patch fungal disease</li></ul></div>
      <div class="season-card" style="background:#e8eaf6;border-color:#c5cae9;"><h3>&#10052;&#65039; Winter</h3><ul><li>Suspend fertilizing (North FL and Gulf Coast)</li><li>Minimal mowing during dormancy</li><li>Water only if extended drought</li><li>Plan spring pre-emergent timing</li></ul></div>
