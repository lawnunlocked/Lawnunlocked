  <h1>Fescue Lawn Care Plan — Tall &amp; Fine Fescue Guide</h1>
  <p>Everything you need for a thick, green fescue lawn — the right mowing height, fall seeding strategy, and weed control timing for cool-season turf.</p>

  <div class="article-body">
    <p>Fescue is the workhorse cool-season grass of the American transition zone and northern states. Tall fescue (Festuca arundinacea) is deep-rooted, shade-tolerant, and reasonably drought-resistant for a cool-season species. Fine fescue species (creeping red, chewings, hard fescue) are even more shade-tolerant and thrive in low-fertility conditions where other grasses struggle.</p><p>The defining characteristic of fescue management is that it thrives in cool weather (spring and fall) and merely survives summer. This makes fall the most important season for all fescue care decisions &mdash; seeding, fertilizing, weed control, and renovation all belong in the fall calendar, not spring.</p><ul><li><strong>Active growth:</strong> September through November and March through May</li><li><strong>Summer dormancy risk:</strong> High in hot, dry climates &mdash; tall fescue can go semi-dormant above 90&deg;F</li><li><strong>Shade tolerance:</strong> Good (tall fescue) to excellent (fine fescues)</li><li><strong>Drought tolerance:</strong> Moderate for cool-season grass, but lower than Bermuda or Zoysia</li><li><strong>Thatch tendency:</strong> Low &mdash; fescue rarely requires aggressive dethatching</li></ul>
    <h2 id="mowing">Mowing: Height and Frequency</h2>
    <p>Fescue should be mowed at 3&ndash;4 inches &mdash; taller than most warm-season grasses. At this height, the deeper root system shades the soil surface, retaining moisture and reducing weed seed germination. Cutting fescue below 2.5 inches during summer heat is one of the fastest ways to thin and damage the stand.</p><p>During summer, raise the mowing height to 4 inches. The additional blade length reduces soil temperature at the crown, significantly improving summer survival rates in the transition zone. Reduce frequency to match growth rate &mdash; fescue slows dramatically in heat and may only need mowing every 10&ndash;14 days in July and August.</p><div class='tip'>&#128161; The one-third rule is more important for fescue than any other grass. Never remove more than one-third of the blade in a single mowing. Scalping fescue in summer heat is very difficult to recover from and often requires fall overseeding to repair.</div><p>A rotary mower is appropriate for fescue at its target heights. Keep blades sharp &mdash; sharp blades leave clean cuts that heal faster and resist disease entry better than torn ends from dull blades.</p>
    <h2 id="fertilizing">Fertilizing Schedule</h2>
    <p>Fescue's fertilizing calendar is the opposite of warm-season grasses. The most important application is in fall, when the grass is actively growing and storing energy for winter. Spring fertilization is secondary. Summer fertilization should be minimal or eliminated entirely.</p><ul><li><strong>Primary fall feeding:</strong> Apply a professional-grade fertilizer like <a href='https://www.amazon.com/dp/B09TLBRQBK?tag=lawnunlocked-20' class='inline-link'>The Andersons PGF Complete 16-4-8</a> in September&ndash;October. This is the single most important fertilizer application of the year for fescue.</li><li><strong>Secondary spring feeding:</strong> Light application in March&ndash;April when soil temps exceed 50&deg;F. Use a balanced or nitrogen-focused formula at a lower rate than fall.</li><li><strong>Summer:</strong> Avoid nitrogen in summer heat. If the lawn shows stress, a small application of <a href='https://www.amazon.com/dp/B08TM3ZCVL?tag=lawnunlocked-20' class='inline-link'>Milorganite</a> is the only fertilizer safe to apply without risk of burning.</li></ul>
    <h2 id="weed">Weed Control Calendar</h2>
    <p>Pre-emergent application timing is different for fescue than warm-season grasses &mdash; and getting it wrong causes significant damage.</p><p><strong>Spring pre-emergent:</strong> Apply <a href='https://www.amazon.com/dp/B015BSNZP2?tag=lawnunlocked-20' class='inline-link'>Prodiamine 65 WDG</a> before soil temps hit 55&deg;F to prevent crabgrass. Critical: do not apply pre-emergent if you plan to overseed that fall &mdash; it will prevent fescue seed germination as effectively as crabgrass germination.</p><p><strong>Fall weed control:</strong> Fall is the best time to control broadleaf weeds in fescue &mdash; weeds are actively moving nutrients to roots, making herbicides more effective. Apply a selective broadleaf herbicide in September&ndash;October, at least 3 weeks before overseeding if you plan to overseed.</p><div class='warn'>&#9888;&#65039; Never apply pre-emergent within 60 days of a planned fescue seeding. Prodiamine has multi-month residual activity and will prevent germination of both weed seed and grass seed equally.</div>
    <h2 id="seasonal">Seasonal Care Overview</h2>
    <div class="season-grid">
      <div class="season-card" style="background:#e8f5e7;border-color:#b6dcb2;"><h3>&#127800; Spring</h3><ul><li>Overseed thin areas when soil is 50&ndash;65&deg;F</li><li>Apply spring pre-emergent if not overseeding</li><li>Light fertilizer application at 50&deg;F</li><li>Raise mowing height to 3&ndash;4 inches</li></ul></div>
      <div class="season-card" style="background:#fff8e6;border-color:#ffe082;"><h3>&#9728;&#65039; Summer</h3><ul><li>Raise mow height to 4 inches</li><li>Reduce mowing frequency to match slow growth</li><li>Water 1&ndash;1.5 inches/week in heat</li><li>Avoid fertilizing in peak heat</li></ul></div>
      <div class="season-card" style="background:#fff3e0;border-color:#ffcc80;"><h3>&#127810; Fall</h3><ul><li>Most important season &mdash; overseed now</li><li>Major fertilizer application in Sept&ndash;Oct</li><li>Broadleaf weed control before overseeding</li><li>Core aerate before overseeding</li></ul></div>
      <div class="season-card" style="background:#e8eaf6;border-color:#c5cae9;"><h3>&#10052;&#65039; Winter</h3><ul><li>No fertilizing during dormancy</li><li>Final mow at 3 inches before frost</li><li>Order spring pre-emergent early</li><li>Sharpen blades, service equipment</li></ul></div>
